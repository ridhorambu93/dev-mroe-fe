name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main", "development" ] # Trigger berjalan saat push ke main atau master
  workflow_dispatch: # Mengizinkan tombol klik manual dari web GitHub

# Mengatur izin token GitHub khusus untuk pembuatan Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Menghindari bentrokan deployment yang berjalan bersamaan
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: bjb-mroe-fe/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: bjb-mroe-fe

      - name: Build Website
        run: npm run build
        working-directory: bjb-mroe-fe

      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: bjb-mroe-fe/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
